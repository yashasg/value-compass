# Host-wide journald retention floor for value-compass services.
#
# Deploy automation copies this file to
# /etc/systemd/journald.conf.d/vca-retention.conf and reloads journald
# with ``systemctl restart systemd-journald``. The retention floor caps
# how long ``vca-api`` and ``vca-poller`` log records (including any line
# that quotes a redacted device-id suffix per backend/poller/apns.py)
# persist on the host, in lock-step with the schedule documented in
# docs/legal/data-retention.md.
#
# 30 days is the operational ceiling for application logs in the
# retention schedule; tighter values are fine on staging hosts. The
# 1 GiB SystemMaxUse cap is a defensive secondary fence so a disk-fill
# incident never breaches the time-based contract above it.
[Journal]
MaxRetentionSec=30day
SystemMaxUse=1G
