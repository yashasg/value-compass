<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Investrum">
  <title>Investrum</title>
  <defs>
    <!-- Subtle background sheen (top-left lighter, bottom darker) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A38"/>
      <stop offset="100%" stop-color="#070C1E"/>
    </linearGradient>
    <!-- Cyan-to-blue gradient for the mark -->
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5BE9FF"/>
      <stop offset="55%"  stop-color="#1FB4FF"/>
      <stop offset="100%" stop-color="#0A66FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square app icon background -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>

  <!-- Logo mark: two stacked triangles; the lower one is split by a horizontal arrow shaft -->
  <g fill="url(#mark)">
    <!-- Top (smaller) triangle -->
    <polygon points="470,260 600,440 340,440"/>

    <!-- Lower (larger) triangle: LEFT portion (above the horizontal slash) -->
    <!-- The horizontal arrow shaft pokes out on the left, then cuts across to the right -->
    <path d="M 470 460
             L 645 700
             L 280 700
             L 380 575
             L 245 575
             L 245 535
             L 412 535 Z"/>

    <!-- Lower (larger) triangle: RIGHT portion (below the slash) — appears as a smaller offset triangle -->
    <polygon points="555,560 720,760 390,760"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="880"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="150"
        font-weight="700"
        letter-spacing="-2"
        fill="#FFFFFF">Investrum</text>
</svg>
