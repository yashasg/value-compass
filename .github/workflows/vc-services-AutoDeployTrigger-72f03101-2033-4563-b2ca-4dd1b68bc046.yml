name: Deploy vc-services to Azure Container Apps

# When this action will be executed
on:
  # Manual trigger only (MVP requirement: no automatic deployment)
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.VCSERVICES_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend/api
          registryUrl: cae127fb809bacr.azurecr.io
          registryUsername: ${{ secrets.VCSERVICES_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.VCSERVICES_REGISTRY_PASSWORD }}
          containerAppName: vc-services
          resourceGroup: puzzlequest-value-compass-rg
          imageToBuild: cae127fb809bacr.azurecr.io/vc-services:${{ github.sha }}
