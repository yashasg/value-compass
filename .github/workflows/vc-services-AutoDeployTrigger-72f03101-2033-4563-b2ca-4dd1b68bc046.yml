name: Deploy vc-services to Azure Container Apps

# MVP deploy policy: manual-only until the app MVP is approved.
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS
#   AZURE_CONTAINER_REGISTRY_LOGIN_SERVER
#   AZURE_CONTAINER_REGISTRY_USERNAME
#   AZURE_CONTAINER_REGISTRY_PASSWORD
#   AZURE_CONTAINER_APP_NAME
#   AZURE_RESOURCE_GROUP
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend/api
          registryUrl: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
          registryUsername: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ secrets.AZURE_CONTAINER_APP_NAME }}:${{ github.sha }}
