name: codeql-ios

# CodeQL for iOS/app sources only. Keep this separate from backend
# analysis so documentation/backend-only pull requests do not run Swift gates.

on:
  pull_request:
    paths:
      - "app/**"
      - "openapi.json"
      - ".github/workflows/codeql-ios.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "openapi.json"
      - ".github/workflows/codeql-ios.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze iOS (swift)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: |
            build/app/xcode-derived-data
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-xcode-codeql-ios-${{ hashFiles('app/VCA.xcodeproj/project.pbxproj', 'app/VCA.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'app/Sources/**/*.swift', 'app/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-codeql-ios-
            ${{ runner.os }}-xcode-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build for analysis
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_ANALYZE=false RUN_TESTS=false ./app/build.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
