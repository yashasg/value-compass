name: codeql-ios

# CodeQL for iOS/app sources only. Keep this separate from backend
# analysis so documentation/backend-only pull requests do not run Swift gates.

# CodeQL is gated on every PR by default, but on this repo a full Swift
# CodeQL run + xcodebuild compile takes ~16-26 minutes and the macOS
# runner queue regularly exceeds 30 minutes. Combined with rapid squad
# commit cadence, every PR-triggered run was being cancelled by
# `cancel-in-progress` before it could finish, so security findings were
# never uploaded. We therefore restrict triggers to: nightly schedule on
# `main`, pushes to `main`, and manual dispatch. PR security feedback is
# delegated to the swift-format / xcodebuild gates in `ios-ci.yml`. See
# issue #206.
on:
  schedule:
    # 06:00 UTC daily ≈ 22:00/23:00 PT — outside US business hours so
    # macOS runner contention is lowest. Schedule fires only on the
    # default branch (main).
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "openapi.json"
      - ".github/workflows/codeql-ios.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

# Serialize runs per ref so back-to-back pushes to main don't queue
# duplicate Swift CodeQL builds on the slow macOS runners. PR-triggered
# runs no longer exist (see `on:` above), so we never need to cancel
# in-progress runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze iOS (swift)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Log selected Xcode version
        # macos-26 runners ship with Xcode 26.x selected by default; just log
        # the version so it is visible in the run. Avoid hard-coding a path
        # like /Applications/Xcode_26.app, which is not guaranteed to exist
        # on the runner image.
        run: sudo xcodebuild -version

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: |
            build/app/xcode-derived-data
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-xcode-codeql-ios-${{ hashFiles('app/VCA.xcodeproj/project.pbxproj', 'app/VCA.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'app/Sources/**/*.swift', 'app/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-codeql-ios-
            ${{ runner.os }}-xcode-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build for analysis
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_ANALYZE=false RUN_TESTS=false ./app/build.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
