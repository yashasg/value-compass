name: codeql-ios

# CodeQL for iOS/frontend sources only. Keep this separate from backend
# analysis so documentation/backend-only pull requests do not run Swift gates.

on:
  pull_request:
    paths:
      - "frontend/**"
      - "ios/**"
      - "openapi.json"
      - ".github/workflows/codeql-ios.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "ios/**"
      - "openapi.json"
      - ".github/workflows/codeql-ios.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze iOS (swift)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build for analysis
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_TESTS=false ./frontend/build.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
