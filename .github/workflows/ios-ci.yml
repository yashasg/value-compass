name: ios-ci

# Builds the iOS app on every PR that touches frontend sources.
# Runs on macOS so xcodebuild is available.

on:
  pull_request:
    paths:
      - "frontend/**"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        working-directory: frontend
        run: |
          xcodebuild \
            -project VCA.xcodeproj \
            -scheme VCA \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
