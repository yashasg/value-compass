name: ios-ci

# Builds the iOS app on every PR that touches app sources.
# Runs on macOS so xcodebuild is available.

on:
  pull_request:
    paths:
      - "app/**"
      - ".swift-format"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".swift-format"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        # macos-26 runners ship with Xcode 26.x selected by default; just log it
        # so the version is visible in the run. Avoid hard-coding a path like
        # /Applications/Xcode_26.app, which is not guaranteed to exist on the
        # runner image.
        run: sudo xcodebuild -version

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: |
            build/app/xcode-derived-data
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-xcode-ios-ci-${{ hashFiles('.swift-format', 'app/VCA.xcodeproj/project.pbxproj', 'app/VCA.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'app/Sources/**/*.swift', 'app/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-ios-ci-
            ${{ runner.os }}-xcode-

      - name: Analyze, build, and test (no signing)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_ANALYZE=true ./app/build.sh
