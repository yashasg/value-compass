name: ios-ci

# Builds the iOS app on every PR that touches app sources.
# Runs on macOS so xcodebuild is available.

on:
  pull_request:
    paths:
      - "app/**"
      - ".swift-format"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".swift-format"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

# Cancel superseded PR runs so a new push to a PR branch frees the slow
# macOS queue immediately. Pushes to main keep their own group per
# branch+workflow and never cancel each other (cancel-in-progress is
# false for the `push` event).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Log selected Xcode version
        # macos-26 runners ship with Xcode 26.x selected by default; just log
        # the version so it is visible in the run. Avoid hard-coding a path
        # like /Applications/Xcode_26.app, which is not guaranteed to exist
        # on the runner image.
        run: sudo xcodebuild -version

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: |
            build/app/xcode-derived-data
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-xcode-ios-ci-${{ hashFiles('.swift-format', 'app/VCA.xcodeproj/project.pbxproj', 'app/VCA.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'app/Sources/**/*.swift', 'app/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-ios-ci-
            ${{ runner.os }}-xcode-

      - name: Analyze, build, and test (no signing)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_ANALYZE=true ./app/build.sh
