name: ios-ci

# Builds the iOS app on every PR that touches frontend sources.
# Runs on macOS so xcodebuild is available.

on:
  pull_request:
    paths:
      - "frontend/**"
      - "ios/**"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "ios/**"
      - "openapi.json"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone ./frontend/build.sh
