name: codeql-backend

# CodeQL for backend sources only. Keep this separate from iOS analysis so
# pull requests only run the security gate for the area they changed.

on:
  pull_request:
    paths:
      - "backend/**"
      - "alembic.ini"
      - ".github/workflows/codeql-backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "alembic.ini"
      - ".github/workflows/codeql-backend.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze backend (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

