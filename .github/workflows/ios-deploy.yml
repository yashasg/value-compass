name: ios-deploy

# Builds, signs, and uploads the iOS app to App Store Connect.
#
# Trigger:
#   * workflow_dispatch — manual-only deployment of a selected ref for MVP.
#
# Rollback procedure: manually dispatch this workflow with a previous good
# commit SHA, branch, or tag as the `ref` input.
#
# Secrets used (from GitHub Secrets):
#   * APPLE_DEV_CERTIFICATE          — base64-encoded .p12 distribution cert
#   * APPLE_DEV_CERTIFICATE_PASSWORD — password for the .p12
#   * APPLE_PROVISIONING_PROFILE     — base64-encoded App Store provisioning profile
#   * APPLE_TEAM_ID                  — Apple Developer Team ID
#   * APP_STORE_CONNECT_API_KEY      — base64-encoded App Store Connect API
#                                       key (.p8) for `xcrun altool` / Transporter
#   * APP_STORE_CONNECT_API_KEY_ID   — Key ID for the .p8 above
#   * APP_STORE_CONNECT_ISSUER_ID    — Issuer ID for the App Store Connect API key
#   * API_BASE_URL                   — backend services base URL injected into the app

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy"
        required: true

concurrency:
  group: ios-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IOS_BUNDLE_ID: com.valuecompass.VCA

jobs:
  deploy:
    runs-on: macos-14
    environment: production
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          APPLE_DEV_CERTIFICATE: ${{ secrets.APPLE_DEV_CERTIFICATE }}
          APPLE_DEV_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEV_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_DEV_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEV_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_PROFILE_NAME=$PROFILE_NAME"
            echo "IOS_PROFILE_UUID=$PROFILE_UUID"
          } >> "$GITHUB_ENV"

      - name: Archive
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "APPLE_TEAM_ID secret must be set." >&2
            exit 1
          fi

          xcodebuild \
            -project VCA.xcodeproj \
            -scheme VCA \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            VCA_API_BASE_URL="$API_BASE_URL" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            archive

      - name: Export IPA
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>__APPLE_TEAM_ID__</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>__IOS_BUNDLE_ID__</key><string>__IOS_PROFILE_NAME__</string>
            </dict>
          </dict>
          </plist>
          PLIST
          sed -i '' \
            -e "s/__APPLE_TEAM_ID__/$APPLE_TEAM_ID/g" \
            -e "s/__IOS_BUNDLE_ID__/$IOS_BUNDLE_ID/g" \
            -e "s/__IOS_PROFILE_NAME__/$IOS_PROFILE_NAME/g" \
            "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_KEY_ID:-}" ] || [ -z "${ASC_ISSUER_ID:-}" ]; then
            echo "APP_STORE_CONNECT_API_KEY_ID and APP_STORE_CONNECT_ISSUER_ID secrets must be set." >&2
            exit 1
          fi
          # Decode the App Store Connect API key (.p8) into the location
          # `xcrun altool` / `xcrun notarytool` look for keys.
          mkdir -p ~/.appstoreconnect/private_keys
          # Filename must match `AuthKey_<KEY_ID>.p8`.
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
