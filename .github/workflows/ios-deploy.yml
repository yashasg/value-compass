name: ios-deploy

# Builds, signs, and uploads the iOS app to App Store Connect.
#
# Triggers (per CI/CD spec — all deploys are git-event driven):
#   * push of a tag matching `ios-v*` — release deploy.
#       Rollback procedure: re-tag a previous good commit with a new
#       `ios-v<timestamp>` tag and push it.
#   * workflow_dispatch              — manual re-run of an existing ref.
#
# Secrets used (from GitHub Secrets):
#   * APPLE_DEV_CERTIFICATE          — base64-encoded .p12 distribution cert
#   * APPLE_DEV_CERTIFICATE_PASSWORD — password for the .p12
#   * APP_STORE_CONNECT_API_KEY      — base64-encoded App Store Connect API
#                                       key (.p8) for `xcrun altool` / Transporter
#   * APP_STORE_CONNECT_API_KEY_ID   — Key ID for the .p8 above
#   * APP_STORE_CONNECT_ISSUER_ID    — Issuer ID for the App Store Connect API key

on:
  push:
    tags:
      - "ios-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy"
        required: true

concurrency:
  group: ios-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: macos-14
    environment: production
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          APPLE_DEV_CERTIFICATE: ${{ secrets.APPLE_DEV_CERTIFICATE }}
          APPLE_DEV_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEV_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_DEV_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEV_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive
        working-directory: ios
        run: |
          xcodebuild \
            -project VCA.xcodeproj \
            -scheme VCA \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            archive

      - name: Export IPA
        working-directory: ios
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_KEY_ID:-}" ] || [ -z "${ASC_ISSUER_ID:-}" ]; then
            echo "APP_STORE_CONNECT_API_KEY_ID and APP_STORE_CONNECT_ISSUER_ID secrets must be set." >&2
            exit 1
          fi
          # Decode the App Store Connect API key (.p8) into the location
          # `xcrun altool` / `xcrun notarytool` look for keys.
          mkdir -p ~/.appstoreconnect/private_keys
          # Filename must match `AuthKey_<KEY_ID>.p8`.
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
