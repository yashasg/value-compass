name: ios-deploy

# Builds, signs, and uploads the iOS app to App Store Connect.
#
# Trigger:
#   * workflow_dispatch — manual-only deployment of a selected ref for MVP.
#
# Rollback procedure: manually dispatch this workflow with a previous good
# commit SHA, branch, or tag as the `ref` input.
#
# Secrets used (from GitHub Secrets):
#   * APPLE_DEV_CERTIFICATE          — base64-encoded .p12 distribution cert
#   * APPLE_DEV_CERTIFICATE_PASSWORD — password for the .p12
#   * APPLE_PROVISIONING_PROFILE     — base64-encoded App Store provisioning profile
#   * APPLE_TEAM_ID                  — Apple Developer Team ID
#   * APP_STORE_CONNECT_API_KEY      — base64-encoded App Store Connect API
#                                       key (.p8 PKCS8 private key)
#   * APP_STORE_CONNECT_API_KEY_ID   — Key ID for the .p8 above
#   * APP_STORE_CONNECT_ISSUER_ID    — Issuer ID for the App Store Connect API key
#   * API_BASE_URL                   — backend services base URL injected into the app

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy"
        required: true

concurrency:
  group: ios-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IOS_BUNDLE_ID: com.valuecompass.VCA

jobs:
  deploy:
    runs-on: macos-26
    environment: production
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Select Xcode
        # App Store Connect requires the iOS 26 SDK (Xcode 26+) for uploads.
        run: sudo xcodebuild -version

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: |
            build/frontend/xcode-derived-data
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-xcode-ios-deploy-${{ hashFiles('frontend/VCA.xcodeproj/project.pbxproj', 'frontend/VCA.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'frontend/Sources/**/*.swift', 'frontend/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-ios-deploy-
            ${{ runner.os }}-xcode-

      - name: Preflight analyze, build, and test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: PLATFORM_MODE=iphone RUN_ANALYZE=true ./frontend/build.sh

      - name: Import signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_DEV_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_DEV_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_PROFILE_NAME=$PROFILE_NAME"
            echo "IOS_PROFILE_UUID=$PROFILE_UUID"
          } >> "$GITHUB_ENV"

      - name: Archive
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.SERVICES_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "APPLE_TEAM_ID secret must be set." >&2
            exit 1
          fi

          xcodebuild \
            -project VCA.xcodeproj \
            -scheme VCA \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$GITHUB_WORKSPACE/build/frontend/xcode-derived-data" \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            VCA_API_BASE_URL="$API_BASE_URL" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            archive

      - name: Export IPA
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>__APPLE_TEAM_ID__</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>__IOS_BUNDLE_ID__</key><string>__IOS_PROFILE_NAME__</string>
            </dict>
          </dict>
          </plist>
          PLIST
          sed -i '' \
            -e "s/__APPLE_TEAM_ID__/$APPLE_TEAM_ID/g" \
            -e "s/__IOS_BUNDLE_ID__/$IOS_BUNDLE_ID/g" \
            -e "s/__IOS_PROFILE_NAME__/$IOS_PROFILE_NAME/g" \
            "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/VCA.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Locate exported IPA
        run: |
          set -euo pipefail
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)"
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"

      - name: Decode App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY:-}" ]; then
            echo "APP_STORE_CONNECT_API_KEY secret must be set." >&2
            exit 1
          fi
          P8="$RUNNER_TEMP/AuthKey.p8"
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$P8"
          chmod 600 "$P8"
          {
            echo 'ASC_API_PRIVATE_KEY<<APPLE_KEY_EOF'
            cat "$P8"
            echo 'APPLE_KEY_EOF'
          } >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ env.IPA_PATH }}
          app-type: ios
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ env.ASC_API_PRIVATE_KEY }}
