name: backend-ci

# Lints and tests the Python backend on every PR that touches backend code.
# No deployment side effects — see backend-deploy.yml for that.

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/Sources/Networking/openapi.json"
      - "alembic.ini"
      - "docs/python/coding_standards.md"
      - "openapi.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/backend-deploy.yml"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/Sources/Networking/openapi.json"
      - "alembic.ini"
      - "docs/python/coding_standards.md"
      - "openapi.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/backend-deploy.yml"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile-check all Python sources
        run: python -m compileall -q backend

      - name: Verify OpenAPI contract is current
        run: PYTHONPATH=backend python3 -m api.export_openapi --check

      - name: Lint Python sources
        run: |
          pip install ruff==0.15.12
          ruff check backend

      - name: Run tests (if any)
        run: |
          if [ -d backend/tests ] || find backend -name 'test_*.py' -print -quit | grep -q .; then
            pip install pytest
            pytest -W error backend
          else
            echo "No tests yet — skipping pytest."
          fi
