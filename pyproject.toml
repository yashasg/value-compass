[tool.ruff]
line-length = 88
src = ["backend"]
target-version = "py311"

[tool.ruff.lint]
select = ["B", "D", "E", "F", "I", "UP", "W"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"backend/**/__init__.py" = ["D104"]
"backend/api/main.py" = ["B008"]
"backend/conftest.py" = ["D103"]
"backend/db/migrations/versions/*.py" = ["D100", "D103"]
"backend/tests/**/*.py" = ["D103", "E402"]

